# HAND Protocol - Anchor workspace configuration
[toolchain]
anchor_version = "0.30.1"
solana_version = "1.18.26"

[features]
resolution = true
skip-lint = false

[programs.devnet]
hand_registry = "11111111111111111111111111111111"
delegation = "11111111111111111111111111111111"
reputation = "11111111111111111111111111111111"
hand_gate = "11111111111111111111111111111111"

[programs.mainnet]
hand_registry = "11111111111111111111111111111111"
delegation = "11111111111111111111111111111111"
reputation = "11111111111111111111111111111111"
hand_gate = "11111111111111111111111111111111"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
